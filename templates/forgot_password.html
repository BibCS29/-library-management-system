{% extends "base.html" %} {% block title %}Forgot Password - Library
Management System{% endblock %} {% block extra_css %}
<style>
  .reset-container {
    max-width: 520px;
    margin: 50px auto;
  }

  .reset-panel {
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
  }

  .reset-panel h1 {
    text-align: center;
    color: #667eea;
  }

  .btn {
    width: 100%;
  }

  .back-link {
    display: block;
    margin-top: 20px;
    text-align: center;
    color: #667eea;
    text-decoration: none;
  }

  .back-link:hover {
    text-decoration: underline;
  }
</style>
{% endblock %} {% block content %}
<div class="reset-container">
  <div class="reset-panel">
    <h1>Forgot Password</h1>

    <form method="POST" action="{{ url_for('forgot_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <div class="form-group">
        <label for="role">Account Type</label>
        <select id="role" name="role" required>
          <option value="Student" {% if role == 'Student' %}selected{% endif %}>
            Student
          </option>
          <option value="Admin" {% if role == 'Admin' %}selected{% endif %}>
            Admin
          </option>
        </select>
      </div>

      <div class="form-group">
        <label for="identifier">Username or Email</label>
        <input
          type="text"
          id="identifier"
          name="identifier"
          value="{{ identifier or '' }}"
          required
          autocomplete="username"
        />
      </div>

      <button type="submit" class="btn btn-primary">Send OTP</button>
    </form>

    <a href="{{ url_for('login') }}" class="back-link">Back to login</a>
  </div>
</div>
{% endblock %}
