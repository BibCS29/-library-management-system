{% extends "base.html" %} {% block title %}Message Admin - Library Management
System{% endblock %} {% block content %}
<h1>Message Admin</h1>

<form
  method="POST"
  action="{{ url_for('student_message_admin') }}"
  style="max-width: 700px"
>
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

  <div class="form-group">
    <label for="subject">Subject</label>
    <input
      type="text"
      id="subject"
      name="subject"
      value="{{ subject or '' }}"
      required
      maxlength="100"
    />
  </div>

  <div class="form-group">
    <label for="message">Message</label>
    <textarea id="message" name="message" required maxlength="1000">{{ message or '' }}</textarea>
  </div>

  <div class="form-group">
    <button type="submit" class="btn btn-primary">Send Message</button>
    <a href="{{ url_for('student_dashboard') }}" class="btn btn-secondary"
      >Cancel</a
    >
  </div>
</form>
{% endblock %}
