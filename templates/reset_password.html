{% extends "base.html" %} {% block title %}Reset Password - Library Management
System{% endblock %} {% block extra_css %}
<style>
  .reset-container {
    max-width: 520px;
    margin: 50px auto;
  }

  .reset-panel {
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
  }

  .reset-panel h1 {
    text-align: center;
    color: #667eea;
  }

  .btn {
    width: 100%;
  }

  .back-link {
    display: block;
    margin-top: 20px;
    text-align: center;
    color: #667eea;
    text-decoration: none;
  }

  .back-link:hover {
    text-decoration: underline;
  }
</style>
{% endblock %} {% block content %}
<div class="reset-container">
  <div class="reset-panel">
    <h1>Reset {{ role }} Password</h1>

    <form method="POST" action="{{ url_for('reset_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <div class="form-group">
        <label for="otp">Email OTP</label>
        <input
          type="text"
          id="otp"
          name="otp"
          required
          maxlength="6"
          minlength="6"
          inputmode="numeric"
          autocomplete="one-time-code"
        />
      </div>

      <div class="form-group">
        <label for="password">New Password</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          autocomplete="new-password"
        />
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm New Password</label>
        <input
          type="password"
          id="confirm_password"
          name="confirm_password"
          required
          autocomplete="new-password"
        />
      </div>

      <button type="submit" class="btn btn-primary">Reset Password</button>
    </form>

    <a href="{{ url_for('forgot_password', role=role) }}" class="back-link"
      >Request a new OTP</a
    >
  </div>
</div>
{% endblock %}
