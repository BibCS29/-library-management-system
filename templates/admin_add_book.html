{% extends "base.html" %} {% block title %}Add Book - Library Management
System{% endblock %} {% block content %}
<h1>Add New Book</h1>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form
  method="POST"
  action="{{ url_for('admin_add_book') }}"
  style="max-width: 500px"
>
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
  <div class="form-group">
    <label for="title">Title</label>
    <input type="text" id="title" name="title" required maxlength="200" />
  </div>

  <div class="form-group">
    <label for="author">Author</label>
    <input type="text" id="author" name="author" required maxlength="200" />
  </div>

  <div class="form-group">
    <button type="submit" class="btn btn-primary">Add Book</button>
    <a href="{{ url_for('admin_books') }}" class="btn btn-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
